name: Cron

# Vercel Hobby restringe crons a 1/dia, asi que la cadencia real se gestiona
# desde GitHub Actions (gratis, minimo 5min). Los endpoints siguen siendo los
# mismos en Vercel y se autentican con CRON_SECRET.
#
# Aviso: en repos publicos, los workflows scheduled se DESACTIVAN tras 60 dias
# sin actividad. Cualquier push/PR resetea ese contador.

on:
  schedule:
    # Ingesta cada 3 horas en punto.
    - cron: "0 */3 * * *"
    # Clasificacion cada 30 minutos en `:00` y `:30`. `limit=8` es un techo:
    # el handler arranca con un wall-clock budget (~52s, ver
    # WALL_TIME_BUDGET_MS en app/api/cron/classify/route.ts) y sale limpio
    # devolviendo 200 antes del cap de 60s de Vercel Hobby. Bandwidth real:
    # ~6-8 articulos/tick x 48 ticks/dia = ~290-380 art/dia.
    - cron: "*/30 * * * *"
    # Broadcast cada 30 minutos en `:15` y `:45` — 15min offset sobre
    # classify para darle tiempo a terminar antes de que publiquemos.
    # El handler tiene su propio budget (~52s) y publica en las 3
    # plataformas (Mastodon, Bluesky, Telegram) en paralelo con
    # idempotencia per-plataforma via `article_broadcasts`.
    - cron: "15,45 * * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Cual cron disparar manualmente"
        required: true
        default: "classify"
        type: choice
        options:
          - ingest
          - classify
          - broadcast

concurrency:
  group: cron-${{ github.event.schedule || inputs.job }}
  cancel-in-progress: false

jobs:
  ingest:
    name: Ingest RSS feeds
    # Solo en el schedule de cada 3h, o si el dispatch lo pide explicitamente.
    if: github.event.schedule == '0 */3 * * *' || inputs.job == 'ingest'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # `KERNELIA_PROD_URL` y `CRON_SECRET` viven como secrets del environment
    # "Production" (no como repo secrets). Sin esta linea `${{ secrets.* }}`
    # los sustituye por "" y `curl` se queja con "No host part in the URL".
    environment: Production
    steps:
      - name: Hit /api/cron/ingest
        env:
          BASE_URL: ${{ secrets.KERNELIA_PROD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          # Fail loud if the secrets are missing. Without this guard GitHub
          # silently substitutes "" and curl reports the unhelpful
          # "URL rejected: No host part in the URL" — costing one cron tick
          # to figure out the real cause.
          : "${BASE_URL:?KERNELIA_PROD_URL secret is empty/unset in repo settings}"
          : "${CRON_SECRET:?CRON_SECRET secret is empty/unset in repo settings}"
          # Trim leading/trailing whitespace (incl. the trailing \n that
          # commonly sneaks in via copy-paste from Vercel) and a trailing
          # slash. Then sanity-check the result.
          BASE_URL="${BASE_URL#"${BASE_URL%%[![:space:]]*}"}"
          BASE_URL="${BASE_URL%"${BASE_URL##*[![:space:]]}"}"
          BASE_URL="${BASE_URL%/}"
          if [[ ! "$BASE_URL" =~ ^https?://[^/]+$ ]]; then
            echo "::error::KERNELIA_PROD_URL is malformed (length=${#BASE_URL}). Expected something like https://kernelia.dev — no trailing slash, no quotes, no whitespace." >&2
            exit 1
          fi
          response=$(curl --silent --show-error --fail-with-body \
            --max-time 90 \
            --retry 2 --retry-delay 10 --retry-connrefused \
            --write-out "\nHTTP %{http_code} in %{time_total}s\n" \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${BASE_URL}/api/cron/ingest")
          echo "${response}"

  classify:
    name: Classify pending articles
    if: github.event.schedule == '*/30 * * * *' || inputs.job == 'classify'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: Production
    steps:
      - name: Hit /api/cron/classify?limit=8
        env:
          BASE_URL: ${{ secrets.KERNELIA_PROD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          : "${BASE_URL:?KERNELIA_PROD_URL secret is empty/unset in repo settings}"
          : "${CRON_SECRET:?CRON_SECRET secret is empty/unset in repo settings}"
          # Trim leading/trailing whitespace (incl. the trailing \n that
          # commonly sneaks in via copy-paste from Vercel) and a trailing
          # slash. Then sanity-check the result.
          BASE_URL="${BASE_URL#"${BASE_URL%%[![:space:]]*}"}"
          BASE_URL="${BASE_URL%"${BASE_URL##*[![:space:]]}"}"
          BASE_URL="${BASE_URL%/}"
          if [[ ! "$BASE_URL" =~ ^https?://[^/]+$ ]]; then
            echo "::error::KERNELIA_PROD_URL is malformed (length=${#BASE_URL}). Expected something like https://kernelia.dev — no trailing slash, no quotes, no whitespace." >&2
            exit 1
          fi
          # No --retry: the handler now enforces its own wall-clock
          # budget and always returns 200 (with `budgetExhausted:
          # true` when it bails early). A 5xx here means a real
          # platform incident — retrying just burns Cerebras tokens
          # and snowballs the TPM throttle into the next franja.
          response=$(curl --silent --show-error --fail-with-body \
            --max-time 90 \
            --write-out "\nHTTP %{http_code} in %{time_total}s\n" \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${BASE_URL}/api/cron/classify?limit=8")
          echo "${response}"

  broadcast:
    name: Broadcast classified articles
    # `15,45 * * * *` for scheduled runs, or explicit dispatch.
    if: github.event.schedule == '15,45 * * * *' || inputs.job == 'broadcast'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: Production
    steps:
      - name: Hit /api/cron/broadcast
        env:
          BASE_URL: ${{ secrets.KERNELIA_PROD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          : "${BASE_URL:?KERNELIA_PROD_URL secret is empty/unset in repo settings}"
          : "${CRON_SECRET:?CRON_SECRET secret is empty/unset in repo settings}"
          BASE_URL="${BASE_URL#"${BASE_URL%%[![:space:]]*}"}"
          BASE_URL="${BASE_URL%"${BASE_URL##*[![:space:]]}"}"
          BASE_URL="${BASE_URL%/}"
          if [[ ! "$BASE_URL" =~ ^https?://[^/]+$ ]]; then
            echo "::error::KERNELIA_PROD_URL is malformed (length=${#BASE_URL})." >&2
            exit 1
          fi
          # Same reasoning as classify: the handler has its own
          # wall-clock budget and never returns 5xx for "I ran out of
          # time". A 5xx from here is a real incident, not something
          # to paper over with --retry.
          response=$(curl --silent --show-error --fail-with-body \
            --max-time 90 \
            --write-out "\nHTTP %{http_code} in %{time_total}s\n" \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${BASE_URL}/api/cron/broadcast")
          echo "${response}"
